name: radix-consultation-v2

services:

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - API_DOMAIN=${API_DOMAIN}
    depends_on:
      - consultation
      - vote-collector
    restart: always
    networks:
      - default

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: always
    networks:
      - default

  consultation:
    image: ${DOCKER_IMAGE_CLIENT:-mountaintop12/consultation:client-latest}
    expose:
      - 3000
    # ports:
    #   - 3000:3000
    depends_on:
      - vote-collector
    restart: always
    env_file: .env
    volumes:
      - ./config.production.js:/app/.output/public/config.js:ro
    networks:
      - default

  vote-collector:
    image: ${DOCKER_IMAGE_SERVER:-mountaintop12/consultation:server-latest}
    expose:
      - 3001
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NETWORK_ID: ${NETWORK_ID}
      SERVER_PORT: 3001
      ENV: production
    restart: always
    networks:
      - default